<h1>Route Planner SDK - Interactive Demo</h1>

<!-- Quick Start -->
<section class="demo-section">
  <h2>🚀 Quick Start</h2>
  <div class="button-group">
    <button (click)="generateAndSolveTask()" [disabled]="isLoading" class="btn-primary">
      Generate Shipment Scenario (20 shipments, 3 agents)
    </button>
    <button (click)="generateValidationTestScenario()" [disabled]="isLoading" class="btn-primary">
      Generate Validation Test Scenario
    </button>
  </div>
</section>

<app-global-settings
  *ngIf="currentResult"
  [(strategy)]="selectedStrategy"
  [(removeStrategy)]="selectedRemoveStrategy"
  [(insertAtIndex)]="insertAtIndex"
  [(insertAfterId)]="insertAfterId"
  [(insertBeforeId)]="insertBeforeId"
  [(allowViolations)]="allowViolations"
  [(priority)]="priority">
</app-global-settings>

<!-- Quick Validation Tests -->
<section class="demo-section validation-tests" *ngIf="currentResult && agentInfoList.length >= 2">
  <h2>🧪 Quick Validation Tests</h2>
  <p class="help-text">One-click tests to demonstrate constraint validations:</p>
  
  <h3>Job Validations</h3>
  <div class="button-group">
    <button (click)="testMissingCapability()" [disabled]="isLoading" class="btn-test">
      🔴 Missing Capability
    </button>
    <button (click)="testCapacityExceeded()" [disabled]="isLoading" class="btn-test">
      ⚖️ Over Capacity
    </button>
    <button (click)="testTimeWindowViolation()" [disabled]="isLoading" class="btn-test">
      ⏰ Wrong Time
    </button>
    <button (click)="testBreakViolation()" [disabled]="isLoading" class="btn-test">
      ☕ During Break
    </button>
    <button (click)="testMultipleViolations()" [disabled]="isLoading" class="btn-test">
      💥 Multiple Issues
    </button>
  </div>

  <h3>Shipment Validations</h3>
  <div class="button-group">
    <button (click)="testShipmentMissingCapability()" [disabled]="isLoading" class="btn-test">
      📦 Missing Capability
    </button>
    <button (click)="testShipmentCapacityExceeded()" [disabled]="isLoading" class="btn-test">
      📦 Over Capacity
    </button>
  </div>
</section>

<app-violations-display
  [violations]="getViolations()"
  (clear)="clearViolations()">
</app-violations-display>

<app-issues-display
  [result]="currentResult">
</app-issues-display>

<div class="content-with-map" *ngIf="currentResult">
  <!-- Sticky Map on Left -->
  <aside class="map-sidebar">
    <div class="map-sticky">
      <h2>🗺️ Map</h2>
      <app-route-map
        [result]="currentResult"
        [apiKey]="apiKey"
        (addJobAtLocation)="openAddJobModalAtLocation($event)"
        (addShipmentAtLocation)="openAddShipmentModalAtLocation($event)">
      </app-route-map>
      
      <!-- Timeline below map -->
      <div class="timeline-section" *ngIf="currentResult">
        <h3>📊 Timeline</h3>
        <div class="button-group">
          <button (click)="lightTheme()">☀️ Light</button>
          <button (click)="darkTheme()">🌙 Dark</button>
        </div>
        <div #timelinesContainer class="timeline-container"></div>
      </div>
    </div>
  </aside>

  <!-- Main Content on Right -->
  <div class="main-content">
    <section class="demo-section">
      <h2>👥 Agents & Routes</h2>
      
      <div class="agents-grid">
        <app-agent-card
          *ngFor="let agent of agentInfoList"
          [agent]="agent"
          [allAgents]="agentInfoList"
          [isLoading]="isLoading"
          (moveSelected)="moveSelectedItems($event)"
          (removeSelected)="removeSelectedFromAgent($event)"
          (addJob)="openAddJobModal($event)"
          (addShipment)="openAddShipmentModal($event)">
        </app-agent-card>
      </div>
    </section>
  </div>
</div>

<!-- When no result, show full width -->
<section class="demo-section" *ngIf="!currentResult">
</section>


<app-operation-logs
  *ngIf="currentResult"
  [logs]="editorLogs"
  (clear)="clearLogs()">
</app-operation-logs>

<!-- Add Job Modal -->
<app-add-job-modal
  *ngIf="showAddJobModal"
  [agentName]="activeAgentForAdd !== null ? getAgentDisplayName(agentInfoList[activeAgentForAdd]) : ''"
  [isLoading]="isLoading"
  [initialCoordinates]="mapClickCoordinates"
  (add)="addJobFromModal($event)"
  (cancel)="closeModals()">
</app-add-job-modal>

<!-- Add Shipment Modal -->
<app-add-shipment-modal
  *ngIf="showAddShipmentModal"
  [agentName]="activeAgentForAdd !== null ? getAgentDisplayName(agentInfoList[activeAgentForAdd]) : ''"
  [isLoading]="isLoading"
  [initialCoordinates]="mapClickCoordinates"
  (add)="addShipmentFromModal($event)"
  (cancel)="closeModals()">
</app-add-shipment-modal>

<!-- Loading Overlay -->
<div class="loading-overlay" *ngIf="isLoading">
  <div class="spinner"></div>
  <span>Processing...</span>
</div>
