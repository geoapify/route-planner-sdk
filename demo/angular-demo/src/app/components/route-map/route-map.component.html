<div class="map-wrapper">
  <div #mapContainer class="map-container"></div>
  <div class="map-legend" *ngIf="result">
    <h4>🗺️ Routes</h4>
    <div class="legend-item" *ngFor="let agent of result.getData().agents">
      <span class="legend-color" [style.background-color]="getAgentColor(agent.agentIndex)"></span>
      <span class="legend-text">
        {{ agent.agentId }}: {{ agent.waypoints.length }} waypoints
        ({{ formatDistance(agent.distance) }}, {{ formatTime(agent.time) }})
      </span>
    </div>
  </div>
</div>
