<section class="demo-section">
  <h2>⚙️ Global Settings</h2>
  <div class="settings-grid">
    <div class="form-group">
      <label>Add/Assign Strategy:</label>
      <select [(ngModel)]="strategy" (ngModelChange)="strategyChange.emit($event)">
        <option [value]="REOPTIMIZE">🔄 Reoptimize (Full optimization)</option>
        <option [value]="PRESERVE_ORDER">📌 Preserve Order (Insert at position)</option>
      </select>
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER">
      <label>Append to End:</label>
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="appendToEnd" (ngModelChange)="appendToEndChange.emit($event)">
        <span>Add to end of route (no API call)</span>
      </label>
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <label>Before Waypoint Index:</label>
      <input type="number" [(ngModel)]="beforeWaypointIndex" (ngModelChange)="beforeWaypointIndexChange.emit($event)" placeholder="e.g., 2">
      <small>Waypoint 0 = start, 1 = first stop, etc.</small>
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <label>After Waypoint Index:</label>
      <input type="number" [(ngModel)]="afterWaypointIndex" (ngModelChange)="afterWaypointIndexChange.emit($event)" placeholder="e.g., 1">
      <small>Waypoint 0 = start, 1 = first stop, etc.</small>
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <label>Before ID (job/shipment):</label>
      <input type="text" [(ngModel)]="beforeId" (ngModelChange)="beforeIdChange.emit($event)" placeholder="e.g., job-3">
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <label>After ID (job/shipment):</label>
      <input type="text" [(ngModel)]="afterId" (ngModelChange)="afterIdChange.emit($event)" placeholder="e.g., order_1">
    </div>

    <div class="form-group">
      <label>Remove Strategy:</label>
      <select [(ngModel)]="removeStrategy" (ngModelChange)="removeStrategyChange.emit($event)">
        <option [value]="REOPTIMIZE">🔄 Reoptimize</option>
        <option [value]="PRESERVE_ORDER">📌 Preserve Order</option>
      </select>
    </div>

    <div class="form-group" *ngIf="strategy === REOPTIMIZE">
      <label>Priority:</label>
      <input type="number" [(ngModel)]="priority" (ngModelChange)="priorityChange.emit($event)" placeholder="e.g., 100">
      <small>Higher values = higher priority during optimization</small>
    </div>

    <div class="form-group">
      <label>Allow Violations:</label>
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="allowViolations" (ngModelChange)="allowViolationsChange.emit($event)">
        <span>Enabled (default)</span>
      </label>
      <small>When checked: violations collected. When unchecked: throws error.</small>
    </div>
  </div>
</section>
