<section class="issues-section" *ngIf="hasIssues()">
  <div class="issues-header">
    <h3>⚠️ Planning Issues ({{ getTotalIssues() }})</h3>
  </div>
  <div class="issues-container">
    <div *ngIf="getUnassignedJobs().length > 0" class="issue-group">
      <div class="issue-title">📋 Unassigned Jobs ({{ getUnassignedJobs().length }}):</div>
      <div class="issue-items">
        <span *ngFor="let job of getUnassignedJobs()" class="issue-badge" [title]="'Index: ' + job.index">
          {{ job.id }}
        </span>
      </div>
    </div>

    <div *ngIf="getUnassignedShipments().length > 0" class="issue-group">
      <div class="issue-title">📦 Unassigned Shipments ({{ getUnassignedShipments().length }}):</div>
      <div class="issue-items">
        <span *ngFor="let shipment of getUnassignedShipments()" class="issue-badge" [title]="'Index: ' + shipment.index">
          {{ shipment.id }}
        </span>
      </div>
    </div>

    <div *ngIf="getUnassignedAgents().length > 0" class="issue-group">
      <div class="issue-title">👤 Unassigned Agents ({{ getUnassignedAgents().length }}):</div>
      <div class="issue-items">
        <span *ngFor="let index of getUnassignedAgents()" class="issue-badge">
          agent-{{ index }}
        </span>
      </div>
    </div>
  </div>
</section>
