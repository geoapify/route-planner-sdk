<section class="issues-section" *ngIf="hasIssuesCache">
  <div class="issues-header">
    <h3>⚠️ Planning Issues ({{ totalIssuesCache }})</h3>
  </div>
  <div class="issues-container">
    <div *ngIf="unassignedJobsCache.length > 0" class="issue-group">
      <div class="issue-title">📋 Unassigned Jobs ({{ unassignedJobsCache.length }}) - Click to assign:</div>
      <div class="issue-items">
        <button *ngFor="let job of unassignedJobsCache" 
                class="issue-badge clickable" 
                [title]="'Click to assign - Index: ' + job.index"
                (click)="onJobClick(job.index)">
          {{ job.id }}
        </button>
      </div>
    </div>

    <div *ngIf="unassignedShipmentsCache.length > 0" class="issue-group">
      <div class="issue-title">📦 Unassigned Shipments ({{ unassignedShipmentsCache.length }}) - Click to assign:</div>
      <div class="issue-items">
        <button *ngFor="let shipment of unassignedShipmentsCache" 
                class="issue-badge clickable" 
                [title]="'Click to assign - Index: ' + shipment.index"
                (click)="onShipmentClick(shipment.index)">
          {{ shipment.id }}
        </button>
      </div>
    </div>

    <div *ngIf="unassignedAgentsCache.length > 0" class="issue-group">
      <div class="issue-title">👤 Unassigned Agents ({{ unassignedAgentsCache.length }}):</div>
      <div class="issue-items">
        <span *ngFor="let agent of unassignedAgentsCache" class="issue-badge">
          {{ agent.id }}
        </span>
      </div>
    </div>
  </div>
</section>
