<section class="violations-section" *ngIf="violations.length > 0">
  <div class="violations-header">
    <h3>⚠️ Constraint Violations ({{ violations.length }})</h3>
    <button (click)="clear.emit()" class="btn-small">Clear</button>
  </div>
  <div class="violations-container">
    <div *ngFor="let violation of violations" class="violation-entry">
      {{ violation }}
    </div>
  </div>
</section>
