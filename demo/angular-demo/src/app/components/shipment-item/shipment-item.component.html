<label class="item-row">
  <input type="checkbox" [(ngModel)]="shipment.selected" (change)="selectionChange.emit()">
  <span class="item-id">{{ shipment.data.id || 'shipment-' + shipment.index }}</span>
  <span class="item-details">
    <span *ngIf="shipment.data.amount" class="amount-badge shipment" title="Shipment amount (pickup + delivery)">
      {{ shipment.data.amount }}kg
    </span>
    <span *ngIf="shipment.data.requirements && shipment.data.requirements.length > 0" 
          class="requirements"
          title="Required capabilities">
      {{ shipment.data.requirements.join(', ') }}
    </span>
  </span>
</label>
