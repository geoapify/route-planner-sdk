<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Assign {{ itemType === 'job' ? 'Job' : 'Shipment' }} to Agent</h3>
    <p class="item-id">{{ itemId }}</p>
    <p class="help-text">Select which agent should handle this {{ itemType }}:</p>
    
    <div class="agent-select-grid">
      <button *ngFor="let agent of allAgents" 
              class="agent-select-btn"
              [disabled]="isLoading"
              (click)="onAssign(agent.index)">
        {{ agent.data.id }}
      </button>
    </div>
    
    <div class="modal-actions">
      <button (click)="onCancel()" class="btn-secondary" [disabled]="isLoading">
        Cancel
      </button>
    </div>
  </div>
</div>
