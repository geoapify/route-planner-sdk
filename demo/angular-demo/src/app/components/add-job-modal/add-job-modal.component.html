<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h3>Add Job</h3>
    
    <div class="form-group">
      <label>Select Agent:</label>
      <select [(ngModel)]="selectedAgentIndex" (ngModelChange)="selectedAgentIndex = +$event">
        <option *ngFor="let agent of allAgents; let i = index" [value]="i">
          {{ agent.data.id }}
        </option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Job ID:</label>
      <input type="text" [(ngModel)]="jobId">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Longitude:</label>
        <input type="number" [(ngModel)]="lon" step="0.001">
      </div>
      <div class="form-group">
        <label>Latitude:</label>
        <input type="number" [(ngModel)]="lat" step="0.001">
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Pickup Amount (kg):</label>
        <input type="number" [(ngModel)]="pickupAmount" min="0">
      </div>
      <div class="form-group">
        <label>Delivery Amount (kg):</label>
        <input type="number" [(ngModel)]="deliveryAmount" min="0">
      </div>
    </div>
    
    <div class="form-group">
      <label>Requirements (comma-separated):</label>
      <input type="text" [(ngModel)]="requirements" placeholder="e.g., refrigerated, fragile">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Time Window Start (seconds):</label>
        <input type="number" [(ngModel)]="timeWindowStart" placeholder="32400 = 9am">
      </div>
      <div class="form-group">
        <label>Time Window End (seconds):</label>
        <input type="number" [(ngModel)]="timeWindowEnd" placeholder="61200 = 5pm">
      </div>
    </div>

    <hr>
    <h4>Options</h4>
    
    <div class="form-group">
      <label>Strategy:</label>
      <select [(ngModel)]="strategy">
        <option [value]="REOPTIMIZE">🔄 Reoptimize (Full optimization)</option>
        <option [value]="PRESERVE_ORDER">📌 Preserve Order (Insert at position)</option>
      </select>
    </div>

    <div class="form-group" *ngIf="strategy === PRESERVE_ORDER">
      <label>Append to End:</label>
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="appendToEnd">
        <span>Add to end of route (no API call)</span>
      </label>
    </div>

    <div class="form-row" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <div class="form-group">
        <label>Before Waypoint Index:</label>
        <input type="number" [(ngModel)]="beforeWaypointIndex" placeholder="e.g., 2">
        <small>Waypoint 0 = start, 1 = first stop</small>
      </div>
      <div class="form-group">
        <label>After Waypoint Index:</label>
        <input type="number" [(ngModel)]="afterWaypointIndex" placeholder="e.g., 1">
        <small>Waypoint 0 = start, 1 = first stop</small>
      </div>
    </div>

    <div class="form-row" *ngIf="strategy === PRESERVE_ORDER && !appendToEnd">
      <div class="form-group">
        <label>Before ID (job/shipment):</label>
        <input type="text" [(ngModel)]="beforeId" placeholder="e.g., job-3">
      </div>
      <div class="form-group">
        <label>After ID (job/shipment):</label>
        <input type="text" [(ngModel)]="afterId" placeholder="e.g., job-1">
      </div>
    </div>

    <div class="form-group" *ngIf="strategy === REOPTIMIZE">
      <label>Priority:</label>
      <input type="number" [(ngModel)]="priority" placeholder="Higher = more important">
    </div>

    <div class="form-group">
      <label>Allow Violations:</label>
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="allowViolations">
        <span>Enabled (default)</span>
      </label>
      <small>When unchecked, throws error if constraints violated</small>
    </div>
    
    <div class="modal-actions">
      <button (click)="onAdd()" [disabled]="isLoading" class="btn-success">
        Add Job
      </button>
      <button (click)="onCancel()" class="btn-secondary">
        Cancel
      </button>
    </div>
  </div>
</div>
